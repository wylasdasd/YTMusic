<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
	<defs>
		<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur in="SourceAlpha" stdDeviation="15" />
			<feOffset dx="0" dy="15" result="offsetblur" />
			<feFlood flood-color="#000" flood-opacity="0.3" />
			<feComposite in2="offsetblur" operator="in" />
			<feMerge>
				<feMergeNode />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>

	<rect x="50" y="50" width="924" height="924" rx="200" ry="200" fill="#fff" filter="url(#shadow)" />

	<circle cx="512" cy="512" r="412" fill="#d32f2f" />
	<circle cx="512" cy="512" r="290" fill="none" stroke="#e0e0e0" stroke-width="15" />

	<text x="512" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="280" fill="#fff">YT</text>

	<circle cx="700" cy="310" r="100" fill="#e3f2fd" stroke="#90caf9" stroke-width="8" />
	<text x="700" y="380" text-anchor="middle" font-family="Noto Sans CJK SC, STHeiti, sans-serif" font-weight="500" font-size="180" fill="#607d8b">伪</text>
</svg>